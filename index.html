<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Ponto - Login</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%233498db'/%3E%3Ccircle cx='50' cy='50' r='36' fill='white'/%3E%3Cpath d='M50 30 L50 52 L68 60' stroke='%233498db' stroke-width='6' stroke-linecap='round'/%3E%3C/svg%3E">
    <link rel="shortcut icon" href="/SISTEMA-DE-PONTO/favicon.ico">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <div class="logo">
                <h1>🕐 Sistema de Ponto</h1>
                <p>Controle de Frequência e Jornada</p>
            </div>
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required placeholder="seu.email@empresa.com">
                </div>
                <div class="form-group">
                    <label for="password">Senha:</label>
                    <input type="password" id="password" name="password" required placeholder="Sua senha">
                </div>
                <button type="submit" class="btn btn-primary btn-login">Entrar</button>
            </form>
            <!-- <div class="login-info">
                <p><strong>Usuários Demo:</strong></p>
                <ul>
                    li>TI (Admin Sistema): ti@empresa.com / ti123</li>
                    <li>RH (Admin Negócio): rh@empresa.com / rh123</li>
                    <li>Gestor: gestor@empresa.com / gestor123</li>
                    <li>Funcionário: joao@empresa.com / joao123</li>
                </ul> 
            </div> -->
        </div>
    </div>

    <script src="js/database.js"></script>
    <script src="js/sync.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if(Auth.login(email, password)) {
                window.location.href = 'dashboard.html';
            } else {
                alert('Email ou senha incorretos');
            }
        });
    </script>
</body>
</html>
